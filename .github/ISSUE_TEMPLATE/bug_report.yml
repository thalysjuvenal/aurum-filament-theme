name: Bug Report
description: Report a problem with the Aurum Filament Theme
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so it can be reproduced and fixed quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Install the theme with color preset '...'
        2. Navigate to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: |
        Since this is a visual theme, screenshots make bugs much easier to diagnose. If the issue is styling-related, please include screenshots of **both light and dark mode** when relevant.
      placeholder: Drag and drop images here, or paste from clipboard.
    validations:
      required: false

  - type: dropdown
    id: color-preset
    attributes:
      label: Color preset
      description: Which Aurum color preset are you using?
      options:
        - Gold
        - Emerald
        - Sapphire
        - Ruby
        - Custom
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Aurum Filament Theme version
      placeholder: e.g. 1.1.0
    validations:
      required: true

  - type: input
    id: filament-version
    attributes:
      label: Filament version
      placeholder: e.g. v5.6.8
    validations:
      required: true

  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: e.g. 12.x
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 126, Safari 17
    validations:
      required: false

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Existing issues
      options:
        - label: I have searched existing issues and this bug has not already been reported.
          required: true
